<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Icons in Stone — 3D Gallery</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#0a0a0c; font-family: 'Georgia', serif; }
  #container { width:100vw; height:100vh; display:block; touch-action:none; }
  #loading {
    position:fixed; inset:0; background:#0a0a0c; color:#e8d9b5;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    z-index:100; letter-spacing:2px; transition: opacity .6s ease;
  }
  #loading h1 { font-size: 1.4rem; font-weight:300; margin-bottom: 14px; text-transform:uppercase; }
  #bar { width: 280px; height: 3px; background:#2a2a2e; }
  #fill { width:0%; height:100%; background:#c9a86a; transition: width .2s ease; }
  #pct { margin-top:10px; font-size:0.8rem; color:#8a8276; font-family: monospace; }

  .label {
    color:#f4ecd8;
    font-family: 'Georgia', serif;
    text-align:center;
    pointer-events:none;
    user-select:none;
  }
  .label .name {
    font-size: 17px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9), 0 0 18px rgba(201,168,106,0.35);
  }
#debugLog {
    position:fixed; bottom:0; left:0; right:0; max-height:40vh; overflow-y:auto;
    background:rgba(0,0,0,0.92); color:#ff6b6b; font-family: monospace; font-size:11px;
    padding:8px; z-index:200; display:none; white-space:pre-wrap; line-height:1.4;
  }
  #debugLog.show { display:block; }
  #debugLog .ok { color:#7ee787; }
  #debugLog .info { color:#9fb3d1; }
  #hint {
    position:fixed; bottom:18px; left:50%; transform:translateX(-50%);
    color:#9a9486; font-size:11px; letter-spacing:1.5px; text-transform:uppercase;
    font-family: 'Georgia', serif; opacity:0.7; z-index:10; pointer-events:none;
  }
  #title {
    position:fixed; top:18px; left:50%; transform:translateX(-50%);
    color:#e8d9b5; font-size:13px; letter-spacing:4px; text-transform:uppercase;
    font-family: 'Georgia', serif; opacity:0.85; z-index:10; pointer-events:none;
  }
</style>
</head>
<body>
<div id="loading">
  <h1>Entering the Gallery</h1>
  <div id="bar"><div id="fill"></div></div>
  <div id="pct">0%</div>
</div>
<div id="title">Icons in Stone</div>
<div id="hint">Drag a statue to spin it · Drag elsewhere to look around · Scroll to zoom</div>
<div id="debugLog"></div>
<div id="container"></div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { KTX2Loader } from 'three/addons/loaders/KTX2Loader.js';
import { MeshoptDecoder } from 'three/addons/libs/meshopt_decoder.module.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';
import { RoomEnvironment } from 'three/addons/environments/RoomEnvironment.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

// ---------- On-screen debug log (no devtools needed) ----------
const debugLog = document.getElementById('debugLog');
function dbg(msg, cls){
  debugLog.classList.add('show');
  const line = document.createElement('div');
  if (cls) line.className = cls;
  line.textContent = msg;
  debugLog.appendChild(line);
}
window.addEventListener('error', (e) => {
  dbg('JS ERROR: ' + (e.message || e) + (e.filename ? ' @ ' + e.filename + ':' + e.lineno : ''));
});
window.addEventListener('unhandledrejection', (e) => {
  dbg('PROMISE ERROR: ' + (e.reason && e.reason.message ? e.reason.message : e.reason));
});
dbg('Script started…', 'info');

const container = document.getElementById('container');

// ---------- Renderer ----------
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.05;
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.outputColorSpace = THREE.SRGBColorSpace;
container.appendChild(renderer.domElement);

// Label renderer (CSS2D)
const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0px';
labelRenderer.domElement.style.pointerEvents = 'none';
container.appendChild(labelRenderer.domElement);

// ---------- Scene ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0c0c0e);
scene.fog = new THREE.Fog(0x0c0c0e, 18, 42);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(0, 2.4, 11);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.set(0, 1.7, 0);
controls.enableDamping = true;
controls.dampingFactor = 0.06;
controls.minDistance = 4;
controls.maxDistance = 20;
controls.maxPolarAngle = Math.PI / 1.95;
controls.update();

// ---------- Environment (for realistic reflections) ----------
const pmremGenerator = new THREE.PMREMGenerator(renderer);
scene.environment = pmremGenerator.fromScene(new RoomEnvironment(), 0.04).texture;

// ---------- Floor ----------
const floorGeo = new THREE.PlaneGeometry(60, 60);
const floorMat = new THREE.MeshStandardMaterial({
  color: 0x16151a,
  roughness: 0.25,
  metalness: 0.35,
});
const floor = new THREE.Mesh(floorGeo, floorMat);
floor.rotation.x = -Math.PI/2;
floor.receiveShadow = true;
scene.add(floor);

// subtle floor grid reflection accent rings under pillars
function addFloorGlow(x){
  const ringGeo = new THREE.RingGeometry(1.05, 1.9, 64);
  const ringMat = new THREE.MeshBasicMaterial({ color:0xc9a86a, transparent:true, opacity:0.07 });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = -Math.PI/2;
  ring.position.set(x, 0.01, 0);
  scene.add(ring);
}

// ---------- Walls ----------
const wallMat = new THREE.MeshStandardMaterial({ color: 0x1b1a1f, roughness: 0.85, metalness: 0.05 });
const backWall = new THREE.Mesh(new THREE.PlaneGeometry(60, 14), wallMat);
backWall.position.set(0, 7, -14);
backWall.receiveShadow = true;
scene.add(backWall);

const leftWall = new THREE.Mesh(new THREE.PlaneGeometry(60, 14), wallMat);
leftWall.rotation.y = Math.PI/2;
leftWall.position.set(-18, 7, 0);
scene.add(leftWall);

const rightWall = new THREE.Mesh(new THREE.PlaneGeometry(60, 14), wallMat);
rightWall.rotation.y = -Math.PI/2;
rightWall.position.set(18, 7, 0);
scene.add(rightWall);

const ceiling = new THREE.Mesh(new THREE.PlaneGeometry(60, 60), new THREE.MeshStandardMaterial({color:0x070708, roughness:0.95}));
ceiling.rotation.x = Math.PI/2;
ceiling.position.y = 14;
scene.add(ceiling);

// Decorative wall panel strips (museum look)
for (let i=-1; i<=1; i++){
  const panel = new THREE.Mesh(
    new THREE.PlaneGeometry(4.4, 8.5),
    new THREE.MeshStandardMaterial({ color:0x232228, roughness:0.6, metalness:0.15 })
  );
  panel.position.set(i*6.5, 5.5, -13.85);
  scene.add(panel);
}

// ---------- Lighting ----------
const hemi = new THREE.HemisphereLight(0x9aa3b5, 0x0a0a0c, 0.55);
scene.add(hemi);

const ambient = new THREE.AmbientLight(0xffffff, 0.18);
scene.add(ambient);

// Key spotlights for each pillar (warm gallery spots)
function addSpot(x, color=0xfff1d6, intensity=55){
  const spot = new THREE.SpotLight(color, intensity, 18, Math.PI/7, 0.35, 1.5);
  spot.position.set(x, 9.5, 3.5);
  spot.target.position.set(x, 2.2, 0);
  spot.castShadow = true;
  spot.shadow.mapSize.set(1024,1024);
  spot.shadow.bias = -0.0005;
  scene.add(spot);
  scene.add(spot.target);

  // visible light fixture
  const fixture = new THREE.Mesh(
    new THREE.CylinderGeometry(0.18,0.22,0.35,16),
    new THREE.MeshStandardMaterial({color:0x111111, metalness:0.8, roughness:0.3})
  );
  fixture.position.set(x, 9.7, 3.5);
  scene.add(fixture);
}
[-6.6, -2.2, 2.2, 6.6].forEach(x => addSpot(x));

// soft rim light from behind
const rim = new THREE.DirectionalLight(0x6f7bff, 0.18);
rim.position.set(0, 8, -10);
scene.add(rim);

// ---------- Pillars ----------
const pillarMat = new THREE.MeshStandardMaterial({
  color: 0xe8e3d8,
  roughness: 0.35,
  metalness: 0.05,
});
const pillarTopMat = new THREE.MeshStandardMaterial({
  color: 0xd9d2c2,
  roughness: 0.3,
});

function buildPillar(x){
  const group = new THREE.Group();

  const base = new THREE.Mesh(new THREE.BoxGeometry(1.7,0.22,1.7), pillarTopMat);
  base.position.y = 0.11;
  base.castShadow = true; base.receiveShadow = true;
  group.add(base);

  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.62,0.62,1.7,32), pillarMat);
  shaft.position.y = 0.22 + 0.85;
  shaft.castShadow = true; shaft.receiveShadow = true;
  group.add(shaft);

  // fluting detail
  for (let i=0;i<16;i++){
    const groove = new THREE.Mesh(new THREE.BoxGeometry(0.04,1.6,0.04), new THREE.MeshStandardMaterial({color:0xcfc8b8, roughness:0.4}));
    const angle = (i/16)*Math.PI*2;
    groove.position.set(Math.cos(angle)*0.63, 0.22+0.85, Math.sin(angle)*0.63);
    group.add(groove);
  }

  const cap = new THREE.Mesh(new THREE.CylinderGeometry(0.8,0.7,0.18,32), pillarTopMat);
  cap.position.y = 0.22 + 1.7 + 0.09;
  cap.castShadow = true; cap.receiveShadow = true;
  group.add(cap);

  const plate = new THREE.Mesh(new THREE.CylinderGeometry(0.74,0.74,0.05,32), new THREE.MeshStandardMaterial({color:0x2a2a2c, metalness:0.6, roughness:0.4}));
  plate.position.y = 0.22 + 1.7 + 0.18 + 0.025;
  group.add(plate);

  group.position.x = x;
  scene.add(group);
  addFloorGlow(x);

  // top surface Y where statue feet should sit
  return 0.22 + 1.7 + 0.18 + 0.05;
}

const positions = [-6.6, -2.2, 2.2, 6.6]; // four pillars, evenly spaced, centred
const pillarTopY = positions.map(buildPillar);

// ---------- Stone Engravings (carved nameplates on the pillar shaft) ----------
function makeEngravingTexture(name){
  const w = 512, h = 160;
  const canvas = document.createElement('canvas');
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');

  // base stone tone matching pillar
  ctx.fillStyle = '#e7e2d4';
  ctx.fillRect(0,0,w,h);

  // subtle stone noise
  for (let i=0;i<2200;i++){
    const gx = Math.random()*w, gy = Math.random()*h;
    const a = Math.random()*0.05;
    ctx.fillStyle = `rgba(0,0,0,${a})`;
    ctx.fillRect(gx, gy, 1.4, 1.4);
  }

  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '700 64px Georgia, "Times New Roman", serif';

  const cx = w/2, cy = h/2 + 4;

  // carved-in look: dark offset (shadow into stone) + light offset (catching light from above)
  ctx.fillStyle = 'rgba(20,18,14,0.55)';
  ctx.fillText(name.toUpperCase(), cx+2, cy+3);
  ctx.fillStyle = 'rgba(255,250,235,0.65)';
  ctx.fillText(name.toUpperCase(), cx-1.5, cy-2);
  ctx.fillStyle = '#3a352c';
  ctx.fillText(name.toUpperCase(), cx, cy);

  // thin rule lines above/below like a museum plaque
  ctx.strokeStyle = 'rgba(60,55,45,0.4)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(60, cy-46); ctx.lineTo(w-60, cy-46);
  ctx.moveTo(60, cy+46); ctx.lineTo(w-60, cy+46);
  ctx.stroke();

  const tex = new THREE.CanvasTexture(canvas);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = 8;
  return tex;
}

function addStoneEngraving(x, name){
  const tex = makeEngravingTexture(name);
  const plateGeo = new THREE.BoxGeometry(1.5, 0.42, 0.04);
  const plateMat = new THREE.MeshStandardMaterial({
    map: tex,
    color: 0xffffff,
    roughness: 0.55,
    metalness: 0.02,
  });
  const plate = new THREE.Mesh(plateGeo, plateMat);
  // mount flush on the front face of the pillar shaft, just below the cap
  plate.position.set(x, 1.55, 0.665);
  plate.castShadow = true;
  plate.receiveShadow = true;
  scene.add(plate);

  // thin recessed frame to sell the "engraved tablet" look
  const frameGeo = new THREE.BoxGeometry(1.62, 0.54, 0.015);
  const frameMat = new THREE.MeshStandardMaterial({ color: 0xd3cdbb, roughness: 0.7 });
  const frame = new THREE.Mesh(frameGeo, frameMat);
  frame.position.set(x, 1.55, 0.66);
  scene.add(frame);
}
addStoneEngraving(positions[0], 'Kanye West');
addStoneEngraving(positions[1], 'Kurt Cobain');
addStoneEngraving(positions[2], 'Chris Brown');
addStoneEngraving(positions[3], 'Eminem');

// ---------- Load Statues ----------
const loader = new GLTFLoader();
const ktx2Loader = new KTX2Loader();
ktx2Loader.setTranscoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/basis/');
ktx2Loader.detectSupport(renderer);
loader.setKTX2Loader(ktx2Loader);
loader.setMeshoptDecoder(MeshoptDecoder);
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://unpkg.com/three@0.160.0/examples/jsm/libs/draco/gltf/');
loader.setDRACOLoader(dracoLoader);
const fill = document.getElementById('fill');
const pct = document.getElementById('pct');
const loadingScreen = document.getElementById('loading');

const models = [
  { url: 'https://raw.githubusercontent.com/danceknightxd/kanyew/main/kanye-fast-medium%20(1).glb', x: positions[0], topY: pillarTopY[0] },
  { url: 'https://raw.githubusercontent.com/danceknightxd/kurt/main/kurt-compressed.glb',           x: positions[1], topY: pillarTopY[1] },
  { url: 'https://raw.githubusercontent.com/danceknightxd/chris/main/chris-compressed.glb',         x: positions[2], topY: pillarTopY[2] },
  { url: 'https://github.com/danceknightxd/EMINEM1/raw/refs/heads/main/compressed-Meshy_AI_Faceted_Portrait_0701120610_texture.glb', x: positions[3], topY: pillarTopY[3] },
];

let totalLoaded = 0;
const progressPerModel = {};

function updateProgress(){
  const vals = Object.values(progressPerModel);
  const avg = vals.length ? vals.reduce((a,b)=>a+b,0)/models.length : 0;
  const p = Math.min(100, Math.round(avg));
  fill.style.width = p + '%';
  pct.textContent = p + '%';
}

const statueRoots = [];

const FLOAT_GAP = 0.35; // fixed gap between pillar top and the bottom of each statue

function placeStatue(root, x, topY){
  // Normalize size & rest on pillar (then lift by FLOAT_GAP)
  root.updateMatrixWorld(true);
  const box = new THREE.Box3().setFromObject(root);
  const size = new THREE.Vector3();
  box.getSize(size);

  let targetHeight = 2.15;
  let scale = targetHeight / Math.max(size.y, 0.0001);

  // guard against degenerate / non-finite bounding boxes from odd exports
  if (!isFinite(scale) || scale <= 0 || scale > 100000) {
    console.warn('Unusual bounding box for model at x=', x, size, '— falling back to scale 1');
    scale = 1;
  }
  root.scale.setScalar(scale);

  // recompute box after scaling
  root.updateMatrixWorld(true);
  const box2 = new THREE.Box3().setFromObject(root);
  const center = new THREE.Vector3();
  box2.getCenter(center);
  const min = box2.min;

  root.position.x += (x - center.x);
  root.position.z += (0 - center.z);
  root.position.y += (topY - min.y) + FLOAT_GAP;

  root.traverse(obj => {
    if (obj.isMesh){
      obj.castShadow = true;
      obj.receiveShadow = true;
      obj.visible = true;
      obj.frustumCulled = false;
      if (obj.material) {
        obj.material.envMapIntensity = 1.0;
        obj.material.side = THREE.DoubleSide;
      }
    }
  });

  // Wrap in a pivot group anchored at the statue's own vertical centerline,
  // so dragging spins it in place rather than around the world origin.
  const pivot = new THREE.Group();
  pivot.position.set(x, 0, 0);
  root.position.x -= x;
  pivot.add(root);
  scene.add(pivot);
  statueRoots.push(pivot);

  // soft glowing disc beneath the floating statue to sell the hover
  const glow = new THREE.Mesh(
    new THREE.CircleGeometry(0.55, 32),
    new THREE.MeshBasicMaterial({ color: 0xc9a86a, transparent: true, opacity: 0.18 })
  );
  glow.rotation.x = -Math.PI/2;
  glow.position.set(x, topY + 0.02, 0);
  scene.add(glow);
}

let loadedCount = 0;
let screenHidden = false;

function hideLoadingScreen(){
  if (screenHidden) return;
  screenHidden = true;
  loadingScreen.style.opacity = '0';
  setTimeout(()=> loadingScreen.style.display='none', 650);
}

function markDone(){
  loadedCount++;
  if (loadedCount >= models.length){    setTimeout(hideLoadingScreen, 300);
  }
}

// Safety net: never leave the visitor staring at a stuck loading screen.
setTimeout(hideLoadingScreen, 20000);

models.forEach(m => {
  progressPerModel[m.url] = 0;
  dbg('Loading: ' + m.url, 'info');
  loader.load(
    m.url,
    (gltf) => {
      dbg('✓ Downloaded OK: ' + m.url.split('/').pop(), 'ok');
      try {
        let root = gltf.scene;
        if (!root || root.children.length === 0) {
          root = (gltf.scenes && gltf.scenes[0]) ? gltf.scenes[0] : root;
        }
        const box = new THREE.Box3().setFromObject(root);
        const size = new THREE.Vector3();
        box.getSize(size);
        dbg('  bounding box size: x=' + size.x.toFixed(3) + ' y=' + size.y.toFixed(3) + ' z=' + size.z.toFixed(3));
        placeStatue(root, m.x, m.topY);
        dbg('  placed on pillar OK', 'ok');
      } catch (e) {
        dbg('✗ PLACEMENT ERROR for ' + m.url.split('/').pop() + ': ' + e.message);
        console.error('Failed to place statue for', m.url, e);
      }
      progressPerModel[m.url] = 100;
      updateProgress();
      markDone();
    },
    (xhr) => {
      if (xhr.total){
        progressPerModel[m.url] = (xhr.loaded/xhr.total)*100;
        updateProgress();
      }
    },
    (err) => {
      dbg('✗ DOWNLOAD FAILED: ' + m.url.split('/').pop() + ' — ' + (err && err.message ? err.message : 'see network tab; likely 404 or CORS'));
      console.error('Failed to load', m.url, err);
      progressPerModel[m.url] = 100;
      updateProgress();
      markDone();
    }
  );
});

// ---------- Resize ----------
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});

// ---------- Per-statue click-drag rotation ----------
const raycaster = new THREE.Raycaster();
const pointerNDC = new THREE.Vector2();
let draggingStatue = null;
let lastPointerX = 0;
const ROTATE_SENSITIVITY = 0.012;

function getPointerPos(e){
  const rect = renderer.domElement.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return {
    x: clientX,
    y: clientY,
    nx: ((clientX - rect.left) / rect.width) * 2 - 1,
    ny: -((clientY - rect.top) / rect.height) * 2 + 1,
  };
}

function tryStartStatueDrag(e){
  const p = getPointerPos(e);
  pointerNDC.set(p.nx, p.ny);
  raycaster.setFromCamera(pointerNDC, camera);
  const hits = raycaster.intersectObjects(statueRoots, true);
  if (hits.length > 0){
    let obj = hits[0].object;
    while (obj.parent && !statueRoots.includes(obj)) obj = obj.parent;
    draggingStatue = obj;
    lastPointerX = p.x;
    controls.enabled = false; // hand control to the statue, not the camera
    return true;
  }
  return false;
}

function onPointerDown(e){
  if (tryStartStatueDrag(e)){
    e.preventDefault();
  }
}
function onPointerMove(e){
  if (!draggingStatue) return;
  const p = getPointerPos(e);
  const deltaX = p.x - lastPointerX;
  lastPointerX = p.x;
  draggingStatue.rotation.y += deltaX * ROTATE_SENSITIVITY;
}
function onPointerUp(){
  if (draggingStatue){
    draggingStatue = null;
    controls.enabled = true;
  }
}

renderer.domElement.addEventListener('mousedown', onPointerDown);
renderer.domElement.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerUp);

renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
renderer.domElement.addEventListener('touchmove', onPointerMove, { passive: false });
window.addEventListener('touchend', onPointerUp);

// ---------- Animate ----------
function animate(){
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
